        <div id="main-content"><h1 id="">IETF言語タグ</h1>
<p>IETF言語タグは言語を識別するためのタグです。
以下の要素をハイフンでつなげて言語を表します。</p>
<div class="table-wrapper"><table><thead><tr><th style="text-align: left">要素</th><th style="text-align: left">意味</th></tr></thead><tbody>
<tr><td style="text-align: left">language (言語)</td><td style="text-align: left">何語であるか</td></tr>
<tr><td style="text-align: left">script (文字体系)</td><td style="text-align: left">どの文字を使うか</td></tr>
<tr><td style="text-align: left">region (地域)</td><td style="text-align: left">どの地域で使われるか</td></tr>
<tr><td style="text-align: left">variant (派生)</td><td style="text-align: left">どの方言か</td></tr>
<tr><td style="text-align: left">extension (拡張)</td><td style="text-align: left">(将来のための予約)</td></tr>
<tr><td style="text-align: left">privateuse (私用)</td><td style="text-align: left">(自由利用)</td></tr>
</tbody></table>
</div></div>
